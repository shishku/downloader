name: Download YouTube URLs

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    paths:
      - "youtube-urls.txt"

permissions:
  contents: write

jobs:
  download-youtube:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg unzip nodejs
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade yt-dlp

      - name: Create cookies file
        env:
          YOUTUBE_COOKIES_ZIP_B64: ${{ secrets.YOUTUBE_COOKIES_ZIP_B64 }}
        run: |
          if [ -n "$YOUTUBE_COOKIES_ZIP_B64" ]; then
            echo "$YOUTUBE_COOKIES_ZIP_B64" | base64 -d > youtube-cookies.zip
            unzip -o youtube-cookies.zip

            if [ -f youtube-cookies-min.txt ]; then
              mv youtube-cookies-min.txt cookies.txt
            elif [ -f youtube-cookies.txt ]; then
              mv youtube-cookies.txt cookies.txt
            elif [ -f cookies.txt ]; then
              echo "cookies.txt found"
            else
              echo "No cookie file found inside zip"
              exit 1
            fi

            chmod 600 cookies.txt
            echo "Cookies file created"
          else
            echo "No cookie secret found. yt-dlp will run without cookies."
          fi

      - name: Download videos from youtube-urls.txt
        run: |
          mkdir -p downloaded-youtube
          rm -rf downloaded-youtube/*

          count=1

          while IFS= read -r URL || [ -n "$URL" ]; do
            [ -z "$URL" ] && continue

            case "$URL" in
              \#*) continue ;;
            esac

            echo "Downloading: $URL"

            COOKIE_ARGS=""
            if [ -f cookies.txt ]; then
              COOKIE_ARGS="--cookies cookies.txt"
            fi

            yt-dlp \
              $COOKIE_ARGS \
              --js-runtimes node \
              --no-playlist \
              --merge-output-format mp4 \
              -f "bv*+ba/best" \
              -o "downloaded-youtube/video-$count.%(ext)s" \
              "$URL"

            count=$((count + 1))
          done < youtube-urls.txt

      - name: Clear youtube-urls.txt
        if: success()
        run: |
          : > youtube-urls.txt

      - name: Commit downloaded YouTube files and clear list
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloaded-youtube/ youtube-urls.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download YouTube videos and clear URL list"
            git push
          fi
