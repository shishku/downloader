name: Download YouTube URLs

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    paths:
      - "youtube-urls.txt"

permissions:
  contents: write

jobs:
  download-youtube:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo for manual run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout repo after merged PR
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg unzip nodejs npm

          python3 -m pip install --upgrade pip -q
          python3 -m pip install --upgrade --pre "yt-dlp[default]" -q

          node --version
          yt-dlp --version

      - name: Create cookies file
        env:
          YOUTUBE_COOKIES_ZIP_B64: ${{ secrets.YOUTUBE_COOKIES_ZIP_B64 }}
        run: |
          if [ -z "$YOUTUBE_COOKIES_ZIP_B64" ]; then
            echo "Missing GitHub secret: YOUTUBE_COOKIES_ZIP_B64"
            exit 1
          fi

          echo "$YOUTUBE_COOKIES_ZIP_B64" | base64 -d > youtube-cookies.zip
          unzip -o youtube-cookies.zip

          if [ -f youtube-cookies-min.txt ]; then
            mv youtube-cookies-min.txt cookies.txt
          elif [ -f youtube-cookies.txt ]; then
            mv youtube-cookies.txt cookies.txt
          elif [ -f cookies.txt ]; then
            echo "cookies.txt found"
          else
            echo "No cookie file found inside zip"
            exit 1
          fi

          chmod 600 cookies.txt
          echo "Cookies file created"

      - name: Download videos from youtube-urls.txt
        run: |
          mkdir -p downloaded-youtube
          rm -rf downloaded-youtube/*

          if [ ! -s youtube-urls.txt ]; then
            echo "youtube-urls.txt is empty. Nothing to download."
            exit 0
          fi

          MAX_SIZE=$((50 * 1024 * 1024))
          count=1

          while IFS= read -r URL || [ -n "$URL" ]; do
            [ -z "$URL" ] && continue

            case "$URL" in
              \#*) continue ;;
            esac

            echo "Downloading: $URL"

            TEMP_DIR="downloaded-youtube/temp-$count"
            mkdir -p "$TEMP_DIR"

            yt-dlp \
              --cookies cookies.txt \
              --remote-components ejs:github \
              --js-runtimes node \
              --no-playlist \
              --merge-output-format mp4 \
              -f "bv*+ba/b/best" \
              -o "$TEMP_DIR/video-$count.%(ext)s" \
              "$URL"

            VIDEO_FILE="$(find "$TEMP_DIR" -maxdepth 1 -type f | head -n 1)"

            if [ -z "$VIDEO_FILE" ]; then
              echo "No video file downloaded for: $URL"
              exit 1
            fi

            FILE_SIZE="$(stat -c%s "$VIDEO_FILE")"
            EXT="${VIDEO_FILE##*.}"

            echo "Downloaded file: $VIDEO_FILE"
            echo "File size: $FILE_SIZE bytes"

            if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
              echo "File is bigger than 50 MB. Splitting into folder..."

              PART_DIR="downloaded-youtube/video-$count-$EXT-parts"
              mkdir -p "$PART_DIR"

              split -b 50M -d -a 3 "$VIDEO_FILE" "$PART_DIR/video-$count.$EXT.part-"

              echo "Created parts in: $PART_DIR"
            else
              mv "$VIDEO_FILE" "downloaded-youtube/video-$count.$EXT"
              echo "Saved file: downloaded-youtube/video-$count.$EXT"
            fi

            rm -rf "$TEMP_DIR"

            count=$((count + 1))
          done < youtube-urls.txt

      - name: Clear youtube-urls.txt
        if: success()
        run: |
          : > youtube-urls.txt

      - name: Commit downloaded YouTube files and clear list
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloaded-youtube/ youtube-urls.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download YouTube videos and clear URL list"
            git push
          fi
