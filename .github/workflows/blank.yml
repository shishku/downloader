name: Download files from list

on:
  workflow_dispatch:
  push:
    paths:
      - "master.txt"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all files from master.txt
        run: |
          mkdir -p downloads
          rm -f downloads/*

          MAX_SIZE=$((50 * 1024 * 1024))
          count=1

          while IFS= read -r URL || [ -n "$URL" ]; do
            # Skip empty lines
            [ -z "$URL" ] && continue

            echo "Downloading: $URL"

            TEMP_FILE="downloads/raw-$count"

            curl -L \
              --fail \
              --retry 3 \
              --output "$TEMP_FILE" \
              "$URL"

            MIME="$(file --mime-type -b "$TEMP_FILE")"
            echo "Detected MIME: $MIME"

            case "$MIME" in
              video/mp4)
                EXT="mp4"
                ;;
              video/webm)
                EXT="webm"
                ;;
              audio/mpeg)
                EXT="mp3"
                ;;
              audio/mp4)
                EXT="m4a"
                ;;
              audio/webm)
                EXT="webm"
                ;;
              application/zip)
                EXT="zip"
                ;;
              application/pdf)
                EXT="pdf"
                ;;
              image/jpeg)
                EXT="jpg"
                ;;
              image/png)
                EXT="png"
                ;;
              text/plain)
                EXT="txt"
                ;;
              application/json)
                EXT="json"
                ;;
              *)
                EXT="bin"
                ;;
            esac

            FINAL_FILE="downloads/file-$count.$EXT"
            FILE_SIZE="$(stat -c%s "$TEMP_FILE")"

            echo "File size: $FILE_SIZE bytes"

            if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
              echo "File is bigger than 50 MB. Splitting into 50 MB parts..."

              PART_DIR="downloads/file-$count-parts"
              mkdir -p "$PART_DIR"

              split -b 50M -d -a 3 "$TEMP_FILE" "$PART_DIR/file-$count.$EXT.part-"

              ZIP_FILE="downloads/file-$count.$EXT.parts.zip"

              zip -j "$ZIP_FILE" "$PART_DIR"/*

              rm -f "$TEMP_FILE"
              rm -rf "$PART_DIR"

              echo "Created split zip: $ZIP_FILE"
            else
              mv "$TEMP_FILE" "$FINAL_FILE"
              echo "Saved file: $FINAL_FILE"
            fi

            count=$((count + 1))
          done < master.txt

      - name: Commit downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download files from master list"
            git push
          fi
