name: Download files from list

on:
  workflow_dispatch:
  push:
    paths:
      - "master.txt"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all files from master.txt
        run: |
          mkdir -p downloads
          rm -f downloads/*

          count=1

          while IFS= read -r URL || [ -n "$URL" ]; do
            # Skip empty lines
            [ -z "$URL" ] && continue

            echo "Downloading: $URL"

            TEMP_FILE="downloads/raw-$count"

            curl -L \
              --fail \
              --retry 3 \
              --output "$TEMP_FILE" \
              "$URL"

            MIME="$(file --mime-type -b "$TEMP_FILE")"
            echo "Detected MIME: $MIME"

            case "$MIME" in
              video/mp4)
                EXT="mp4"
                ;;
              video/webm)
                EXT="webm"
                ;;
              audio/mpeg)
                EXT="mp3"
                ;;
              audio/mp4)
                EXT="m4a"
                ;;
              audio/webm)
                EXT="webm"
                ;;
              application/zip)
                EXT="zip"
                ;;
              application/pdf)
                EXT="pdf"
                ;;
              image/jpeg)
                EXT="jpg"
                ;;
              image/png)
                EXT="png"
                ;;
              text/plain)
                EXT="txt"
                ;;
              application/json)
                EXT="json"
                ;;
              *)
                EXT="bin"
                ;;
            esac

            mv "$TEMP_FILE" "downloads/file-$count.$EXT"

            count=$((count + 1))
          done < master.txt

      - name: Commit downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download files from master list"
            git push
          fi
