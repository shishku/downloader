name: Download file from URL

on:
  workflow_dispatch:
  push:
    paths:
      - "master.txt"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install file tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file

      - name: Read URL and download file
        run: |
          URL="$(cat master.txt | tr -d '[:space:]')"

          mkdir -p downloads

          curl -L \
            --fail \
            --retry 3 \
            --output downloads/raw-download \
            "$URL"

      - name: Detect file type and rename
        run: |
          MIME="$(file --mime-type -b downloads/raw-download)"
          echo "Detected MIME type: $MIME"

          case "$MIME" in
            video/mp4)
              EXT="mp4"
              ;;
            video/webm)
              EXT="webm"
              ;;
            audio/mpeg)
              EXT="mp3"
              ;;
            audio/mp4)
              EXT="m4a"
              ;;
            audio/webm)
              EXT="webm"
              ;;
            application/zip)
              EXT="zip"
              ;;
            application/pdf)
              EXT="pdf"
              ;;
            image/jpeg)
              EXT="jpg"
              ;;
            image/png)
              EXT="png"
              ;;
            text/plain)
              EXT="txt"
              ;;
            application/json)
              EXT="json"
              ;;
            *)
              EXT="bin"
              ;;
          esac

          mv downloads/raw-download "downloads/downloaded-file.$EXT"
          echo "Saved as downloads/downloaded-file.$EXT"

      - name: Commit downloaded file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download file from URL"
            git push
          fi
